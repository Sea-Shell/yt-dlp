---
on:
  pull_request:
    branches:
      - main

name: Commit lint
jobs:
  lint:
    uses: nrkno/github-workflow-semantic-release/.github/workflows/workflow.yaml@9656d140bafd9040975d4dfd2da77facacae8126 # v4.11.0
    with:
      runs-on: ubuntu-latest
      release-enabled: false
      lint-enabled: true