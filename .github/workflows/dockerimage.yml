name: "Release, build, push and deploy"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - "main"

env:
  IMAGE_REGISTRY: registry.hub.docker.com
  IMAGE_REPOSITORY: bateau
  IMAGE_NAME: ytdlp

permissions:
  contents: read

jobs:
  release:
    name: release
    uses: nrkno/github-workflow-semantic-release/.github/workflows/workflow.yaml@9656d140bafd9040975d4dfd2da77facacae8126 # v4.11.0
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    with:
      runs-on: ubuntu-latest
      release-enabled: true
      lint-enabled: false
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build_push.outputs.digest }}
    needs: release
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ needs.release.outputs.git-tag }}
          fetch-depth: 0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push
        id: build_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.release-version }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
  deploy:
    runs-on: [ubuntu-latest]
    needs: [release, build ]
    permissions:
      id-token: write
      actions: read
      contents: read
    steps:
      # Checkout repo code
      - name: Checkout repo with tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ needs.release.outputs.new-release-published == 'true' }}
        with:
          ref: refs/tags/${{ needs.release.outputs.git-tag }}
      - name: Checkout repo without tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ needs.release.outputs.new-release-published != 'true' }}
      - name: Kubeconfig context
        uses: azure/k8s-set-context@89b837d75b40a7bd2ddafde837473c212db8b313 # v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_KONFIG }}
      - name: Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_ACTION_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_ACTION_CLIENT_SECRET }}
          tags: tag:github
      # Do the deploy on K8s cluster set in the above context
      - name: Deply manifests to k8s
        uses: azure/k8s-deploy@c8cfec839dc09896b3b8cc40cd13d04792680771 # v5
        timeout-minutes: 15
        with:
          action: deploy
          namespace: seashell
          annotate-namespace: false
          strategy: basic
          manifests: |
            kubernetes-manifests/cronjob.yaml
          images: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.git-tag }}@${{ needs.build.outputs.digest }}
